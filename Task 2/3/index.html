<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleX - Insights & Blogs</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="navbar">
        <div class="logo">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M2 13L10.5 2H22L13.5 13H2Z" fill="white" />
            <path
              d="M10.5 22L2 13H13.5L22 22H10.5Z"
              fill="white"
              fill-opacity="0.5"
            />
          </svg>
          <span>ScaleX</span>
        </div>

        <nav class="nav-links">
          <a href="#">Home</a>
          <a href="#">About Us</a>
          <a href="#" class="active">Blogs</a>
          <a href="#">Contact Us</a>
        </nav>

        <a href="#" class="btn-get-started">Get Started</a>
      </header>

      <main>
        <section class="hero-section">
          <h1>Insights & Blogs</h1>

          <div class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Tech</button>
            <button class="filter-btn">SaaS</button>
            <button class="filter-btn">Marketing</button>
          </div>
        </section>

        <section class="blog-grid">
          <article class="blog-card">
            <div class="card-image-wrapper">
              <img
                src="https://i.pinimg.com/1200x/64/3b/ad/643bad21df7ad2eb2e0b6f482faac17c.jpg"
                alt="Martini Glass"
              />
            </div>
            <div class="card-content">
              <span class="category-tag">Tech</span>
              <h2>The Ultimate Guide To SaaS Marketing</h2>
              <time datetime="2025-05-23">May 23, 2025</time>
            </div>
          </article>

          <article class="blog-card">
            <div class="card-image-wrapper">
              <img
                src="https://i.pinimg.com/736x/9a/d3/6f/9ad36f5cb228674eb1f4b8adb07205ce.jpg"
                alt="Green Chair"
              />
            </div>
            <div class="card-content">
              <span class="category-tag">SaaS</span>
              <h2>5 Key Trends In SaaS Growth For 2025</h2>
              <time datetime="2025-05-23">May 23, 2025</time>
            </div>
          </article>

          <article class="blog-card">
            <div class="card-image-wrapper">
              <img
                src="https://i.pinimg.com/736x/51/b6/b4/51b6b404e5a029c5e97087340be4eb90.jpg"
                alt="Orange Cat"
              />
            </div>
            <div class="card-content">
              <span class="category-tag">Marketing</span>
              <h2>How Data-Driven Strategies Are Important</h2>
              <time datetime="2025-05-23">May 23, 2025</time>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
