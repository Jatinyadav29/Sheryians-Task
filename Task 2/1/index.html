<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insecta Collection - Pachyteria Equestris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <div class="logo">INSECT</div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <path
              d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
          <input type="text" placeholder="Search..." />
        </div>
      </div>
      <div class="nav-right">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
      </div>
    </nav>

    <main>
      <div class="hero-image-container">
        <img src="img.png" alt="img" />
      </div>

      <section class="left-col">
        <h2 class="vertical-title">Classification</h2>
        <ul class="classification-list">
          <li>
            <div>
              <span class="class-label">Class:</span>
              <span class="class-value">Insecta</span>
            </div>
          </li>
          <li>
            <div>
              <span class="class-label">Order:</span>
              <span class="class-value">Coleoptera</span>
            </div>
          </li>
          <li>
            <div>
              <span class="class-label">Family:</span>
              <span class="class-value">Cerambycidae</span>
            </div>
          </li>
          <li>
            <div>
              <span class="class-label">Sub-Family:</span>
              <span class="class-value">Cerambycinae</span>
            </div>
          </li>
          <li>
            <div>
              <span class="class-label">Tribe:</span>
              <span class="class-value">Callichromatini</span>
            </div>
          </li>
          <li>
            <div>
              <span class="class-label">Genus:</span>
              <span class="class-value">Pachyteria</span>
            </div>
          </li>
        </ul>
      </section>

      <section class="right-col">
        <h1>Pachyteria<br />equestris</h1>

        <div class="spec-grid">
          <svg
            class="bug-icon"
            viewBox="0 0 100 100"
            fill="none"
            stroke="white"
            stroke-width="2"
          >
            <path
              d="M50 20 C40 20, 35 30, 35 45 C35 70, 40 85, 50 85 C60 85, 65 70, 65 45 C65 30, 60 20, 50 20 Z"
            />
            <path d="M50 20 L50 85" />
            <path d="M35 45 C20 40, 15 25, 15 25" />
            <path d="M65 45 C80 40, 85 25, 85 25" />
            <path d="M36 60 C25 65, 20 80, 20 80" />
            <path d="M64 60 C75 65, 80 80, 80 80" />
            <circle cx="50" cy="15" r="5" />
          </svg>

          <div class="spec-details">
            <div class="spec-item">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                />
              </svg>
              <div class="spec-text">
                <span class="label">Locality:</span>
                <span class="value">Malaysia</span>
              </div>
            </div>
            <div class="spec-item">
              <svg viewBox="0 0 24 24">
                <path
                  d="M21 9V3h-6v2h3.59l-4.48 4.48c-1.21-.85-2.69-1.35-4.28-1.35C5.45 8.13 2 11.58 2 15.86c0 4.28 3.45 7.73 7.73 7.73 4.28 0 7.73-3.45 7.73-7.73 0-1.59-.5-3.07-1.35-4.28L20.59 7H17V5h6v4h-2z"
                />
              </svg>
              <div class="spec-text">
                <span class="label">Sex:</span>
                <span class="value">Male</span>
              </div>
            </div>
            <div class="spec-item">
              <svg viewBox="0 0 24 24">
                <path
                  d="M19.78 4.22a4.996 4.996 0 00-7.07 0L4.22 12.71a4.996 4.996 0 000 7.07 4.996 4.996 0 007.07 0l8.49-8.49a4.996 4.996 0 000-7.07zM15 11l-1.5-1.5L12 11 10.5 9.5 9 11 7.5 9.5 6 11l-1-1 7.07-7.07 1 1-1.5 1.5L13 7l1.5-1.5L16 7l1.5-1.5L19 7l-4 4z"
                />
              </svg>
              <div class="spec-text">
                <span class="label">Size:</span>
                <span class="value">32 mm / 12 mm</span>
              </div>
            </div>
          </div>
        </div>

        <div class="price">$5.99</div>

        <div class="toggles">
          <label class="toggle-row">
            <input type="checkbox" checked />
            <div class="toggle-switch"></div>
            View detailed antennae
          </label>
          <label class="toggle-row">
            <input type="checkbox" />
            <div class="toggle-switch"></div>
            View underside
          </label>
        </div>

        <button class="btn-add">Add to collection</button>
      </section>
    </main>
  </body>
</html>
